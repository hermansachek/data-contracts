apiVersion: v3.1.0
kind: DataContract
id: esg-risk-energy-profile
name: ESG Risk Energy Profile
version: 1.0.0
status: proposed
description:
  purpose: "Automatizace odhadu energetické náročnosti budov pro účely valuace a reportingu."
  usage: "Na základě GPS lokace se vypočítá hodnota energetického štítku pro schvalování úvěru a reporting (EU Taxonomie)."
  limitations: "Odhad založený na statistických modelech a meteo datech, nikoliv na fyzické prohlídce."
  customProperties:
    - property: "concept_ids"
      value: "592, 637, 1126, 1290, 1310"
    - property: "capability"
      value: "Analytical & Scoring Engines, Data Delivery & Compliance"

schema:
  - name: energy_profiles
    physicalType: TABLE
    description: "Odhadované parametry energetické náročnosti na úrovni budovy."
    properties:
      - name: building_id
        logicalType: string
        businessName: Building Identifier
        description: "Unikátní identifikátor budovy z Katastru nemovitostí."
        physicalType: VARCHAR
        examples:
          - "LV-12345-PRG"
        primaryKey: true
        required: true
        unique: true
      - name: gps_latitude
        logicalType: number
        businessName: GPS Latitude
        description: "Zeměpisná šířka budovy."
        physicalType: DOUBLE
        examples:
          - 50.0755
        required: true
      - name: gps_longitude
        logicalType: number
        businessName: GPS Longitude
        description: "Zeměpisná délka budovy."
        physicalType: DOUBLE
        examples:
          - 14.4378
        required: true
      - name: energy_label_estimated
        logicalType: string
        businessName: Estimated Energy Label
        description: "Odhadovaná energetická třída (A až G)."
        physicalType: TEXT
        examples:
          - "B"
        quality:
          - type: library
            metric: invalidValues
            arguments:
              validValues: ["A", "B", "C", "D", "E", "F", "G"]
            mustBe: 0

team:
  name: "Risk (ESG) tým"
  description: "Vlastník procesu odhadu energetické náročnosti."
  members:
    - username: martin.hanus@bank.cz
      name: ESG Owner
      role: Owner
    - username: anna.spilkova@bank.cz
      name: Head of ESG Risk
      role: Owner
    - username: marketa.honcikova@bank.cz
      name: Data Scientist
      role: Owner
    - username: matej.koys@bank.cz
      name: Data Engineer
      role: Owner
    - username: erik.seidl@bank.cz
      name: Risk Quant Analytik
      role: Owner
tags:
  - energy-efficiency
  - scoring

contractCreatedTs: "2026-03-05T11:00:00Z"